name: 'CI – Snyk Security Scan'
description: 'Run Snyk dependency vulnerability scan (HIGH/CRITICAL threshold)'

inputs:
  working_directory:
    description: 'Path to the service root'
    required: true
  snyk_token:
    description: 'Snyk authentication token'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Restore npm cache
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: npm ci || npm install

    - name: Snyk Scan
      uses: snyk/actions/node@0.4.0
      with:
        command: test
        args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
