name: 'CI – Docker Build'
description: 'Build Docker image (optionally with frontend npm build) and upload as artifact'

inputs:
  working_directory:
    description: 'Path to service root (used for npm install/build)'
    required: true
  docker_context:
    description: 'Docker build context directory'
    required: false
    default: '.'
  dockerfile_path:
    description: 'Path to Dockerfile'
    required: false
    default: 'Dockerfile'
  run_build:
    description: 'Run npm build before Docker build (set true for frontend)'
    required: false
    default: 'false'
  docker_build_args:
    description: 'Optional Docker --build-arg value'
    required: false
    default: ''
  service_name:
    description: 'Service / Docker image name'
    required: true
  image_tag:
    description: 'Docker image tag to apply'
    required: true
  docker_username:
    description: 'DockerHub username'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js (frontend only)
      if: inputs.run_build == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Restore npm cache (frontend only)
      if: inputs.run_build == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install dependencies (frontend only)
      if: inputs.run_build == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: npm ci || npm install

    - name: Build frontend assets
      if: inputs.run_build == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: npm run build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      shell: bash
      working-directory: ${{ inputs.docker_context }}
      run: |
        BUILD_ARGS=""
        if [ -n "${{ inputs.docker_build_args }}" ]; then
          BUILD_ARGS="--build-arg ${{ inputs.docker_build_args }}"
        fi
        docker build \
          -f "${{ inputs.dockerfile_path }}" \
          $BUILD_ARGS \
          -t ${{ inputs.docker_username }}/${{ inputs.service_name }}:${{ inputs.image_tag }} \
          .

    - name: Save image as tar artifact
      shell: bash
      run: |
        docker save \
          ${{ inputs.docker_username }}/${{ inputs.service_name }}:${{ inputs.image_tag }} \
          -o /tmp/docker-image.tar

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-${{ inputs.service_name }}
        path: /tmp/docker-image.tar
        retention-days: 1
