name: 'CI – Docker Push'
description: 'Load image artifact, push to DockerHub, and create Git tag on main'

inputs:
  service_name:
    description: 'Service / Docker image name'
    required: true
  image_tag:
    description: 'Docker image tag to push'
    required: true
  docker_username:
    description: 'DockerHub username'
    required: true
  docker_password:
    description: 'DockerHub password / token'
    required: true
  github_token:
    description: 'GitHub token for creating git tags'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: docker-image-${{ inputs.service_name }}
        path: /tmp

    - name: Load Docker image
      shell: bash
      run: docker load -i /tmp/docker-image.tar

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}

    - name: Push Docker Image
      shell: bash
      run: |
        docker push ${{ inputs.docker_username }}/${{ inputs.service_name }}:${{ inputs.image_tag }}

        if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          docker tag \
            ${{ inputs.docker_username }}/${{ inputs.service_name }}:${{ inputs.image_tag }} \
            ${{ inputs.docker_username }}/${{ inputs.service_name }}:latest
          docker push ${{ inputs.docker_username }}/${{ inputs.service_name }}:latest
        fi

    - name: Create Git Tag (main only)
      if: github.ref == 'refs/heads/main'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ inputs.github_token }}
        custom_tag: ${{ inputs.image_tag }}
        tag_prefix: ''
