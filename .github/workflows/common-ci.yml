name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      run_build:
        required: false
        type: boolean
        default: false
      sonar_project_key:
        required: false
        type: string
        default: 'FinanceFlow'
      docker_context:
        required: false
        type: string
        default: '.'
      dockerfile_path:
        required: false
        type: string
        default: 'Dockerfile'
      service-name:
        required: true
        type: string
      docker_build_args:
        required: false
        type: string
        default: ''

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      EMAIL_TO:
        required: true

# ──────────────────────────────────────────────────────────────────────────────
# JOB GRAPH  (each job delegates its steps to a composite action)
#
#   prepare
#     ├── test ─────────────┐
#     ├── sonar ────────────┼──► build ──► trivy ──► push ──► release ──► notify
#     └── snyk  ────────────┘
#
# notify runs on ALL branches and ALL outcomes (always())
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ── JOB 1: PREPARE ──────────────────────────────────────────────────────────
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    outputs:
      tag:  ${{ steps.prepare.outputs.tag }}
      push: ${{ steps.prepare.outputs.push }}
    steps:
      - name: Run Prepare Action
        id: prepare
        uses: finance-flow1/CI-CD-Templates/.github/actions/prepare@main
        with:
          working_directory: ${{ inputs.working_directory }}
          github_token: ${{ github.token }}

  # ── JOB 2: TEST ─────────────────────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Run Tests
        uses: finance-flow1/CI-CD-Templates/.github/actions/run-tests@main
        with:
          working_directory: ${{ inputs.working_directory }}

  # ── JOB 3: SONAR ────────────────────────────────────────────────────────────
  sonar:
    name: "SonarQube"
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Run SonarQube Scan
        uses: finance-flow1/CI-CD-Templates/.github/actions/sonar-scan@main
        with:
          working_directory: ${{ inputs.working_directory }}
          sonar_project_key: ${{ inputs.sonar_project_key }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          sonar_host_url: ${{ secrets.SONAR_HOST_URL }}

  # ── JOB 4: SNYK ─────────────────────────────────────────────────────────────
  snyk:
    name: "Snyk Security"
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Run Snyk Scan
        uses: finance-flow1/CI-CD-Templates/.github/actions/snyk-scan@main
        with:
          working_directory: ${{ inputs.working_directory }}
          snyk_token: ${{ secrets.SNYK_TOKEN }}

  # ── JOB 5: BUILD ────────────────────────────────────────────────────────────
  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk]
    steps:
      - name: Build Docker Image
        uses: finance-flow1/CI-CD-Templates/.github/actions/docker-build@main
        with:
          working_directory: ${{ inputs.working_directory }}
          docker_context: ${{ inputs.docker_context }}
          dockerfile_path: ${{ inputs.dockerfile_path }}
          run_build: ${{ inputs.run_build }}
          docker_build_args: ${{ inputs.docker_build_args }}
          service_name: ${{ inputs.service-name }}
          image_tag: ${{ needs.prepare.outputs.tag }}
          docker_username: ${{ secrets.DOCKER_USERNAME }}

  # ── JOB 6: TRIVY ────────────────────────────────────────────────────────────
  trivy:
    name: "Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Run Trivy Scan
        uses: finance-flow1/CI-CD-Templates/.github/actions/trivy-scan@main
        with:
          service_name: ${{ inputs.service-name }}
          image_tag: ${{ needs.prepare.outputs.tag }}
          docker_username: ${{ secrets.DOCKER_USERNAME }}

  # ── JOB 7: PUSH ─────────────────────────────────────────────────────────────
  push:
    name: "Docker Push"
    runs-on: ubuntu-latest
    needs: [prepare, trivy]
    if: needs.prepare.outputs.push == 'true'
    permissions:
      contents: write
    steps:
      - name: Push Docker Image
        uses: finance-flow1/CI-CD-Templates/.github/actions/docker-push@main
        with:
          service_name: ${{ inputs.service-name }}
          image_tag: ${{ needs.prepare.outputs.tag }}
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          github_token: ${{ github.token }}

  # ── JOB 8: RELEASE ──────────────────────────────────────────────────────────
  release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [prepare, push]
    if: github.ref == 'refs/heads/main' && needs.push.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: finance-flow1/CI-CD-Templates/.github/actions/github-release@main
        with:
          service_name: ${{ inputs.service-name }}
          image_tag: ${{ needs.prepare.outputs.tag }}
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          actor: ${{ github.actor }}
          repository: ${{ github.repository }}

  # ── JOB 9: NOTIFY ───────────────────────────────────────────────────────────
  # Fires on ALL branches and ALL outcomes (success AND failure)
  notify:
    name: "Notify"
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk, build, trivy, push, release]
    if: always()
    steps:
      - name: Resolve pipeline status
        id: status
        shell: bash
        run: |
          RESULTS="${{ join(needs.*.result, ',') }}"
          if echo "$RESULTS" | grep -qE 'failure|cancelled'; then
            echo "value=failure" >> $GITHUB_OUTPUT
          else
            echo "value=success" >> $GITHUB_OUTPUT
          fi

      - name: Send Notification Email
        uses: finance-flow1/CI-CD-Templates/.github/actions/notify@main
        with:
          service_name: ${{ inputs.service-name }}
          image_tag: ${{ needs.prepare.outputs.tag }}
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          pipeline_status: ${{ steps.status.outputs.value }}
          branch: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          repository: ${{ github.repository }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          run_number: ${{ github.run_number }}
          smtp_host: ${{ secrets.SMTP_HOST }}
          smtp_port: ${{ secrets.SMTP_PORT }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          email_to: ${{ secrets.EMAIL_TO }}
