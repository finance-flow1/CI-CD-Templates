name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      run_build:
        required: false
        type: boolean
        default: false
      sonar_project_key:
        required: false
        type: string
        default: 'NexusBank'
      docker_context:
        required: false
        type: string
        default: 'services'
      dockerfile_path:
        required: false
        type: string
        default: ''
      service-name:
        required: true
        type: string

    secrets:
      SONAR_TOKEN: { required: true }
      SONAR_HOST_URL: { required: true }
      SNYK_TOKEN: { required: true }
      DOCKER_USERNAME: { required: true }
      DOCKER_PASSWORD: { required: true }
      SMTP_HOST: { required: true }
      SMTP_PORT: { required: true }
      SMTP_USERNAME: { required: true }
      SMTP_PASSWORD: { required: true }
      EMAIL_TO: { required: true }

# ─────────────────────────────────────────
# PREPARE
# ─────────────────────────────────────────
jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      tag:  ${{ steps.image_tag.outputs.tag }}
      push: ${{ steps.image_tag.outputs.push }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Semantic version (main only)
      - name: Calculate Semantic Version
        id: semver
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: 'v'

      # ✅ Tag logic (clean + safe)
      - name: Resolve Image Tag
        id: image_tag
        run: |
          BRANCH_NAME=$(echo "${GITHUB_REF##*/}" | tr '/' '-')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="${{ steps.semver.outputs.new_tag }}"
            PUSH="true"

          else
            TAG="dev-${BRANCH_NAME}-${SHORT_SHA}"
            PUSH="true"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "push=$PUSH" >> $GITHUB_OUTPUT

# ─────────────────────────────────────────
# TEST
# ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm test

# ─────────────────────────────────────────
# SONAR
# ─────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# ─────────────────────────────────────────
# SNYK
# ─────────────────────────────────────────
  snyk:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: snyk/actions/node@0.4.0
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

# ─────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk]

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Dockerfile
        id: dockerfile
        run: |
          if [ -z "${{ inputs.dockerfile_path }}" ]; then
            echo "path=Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "path=${{ inputs.dockerfile_path }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        working-directory: ${{ inputs.docker_context }}
        run: |
          docker build \
            -f "${{ steps.dockerfile.outputs.path }}" \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
            .

      - name: Save Image
        run: |
          docker save \
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
            -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar

# ─────────────────────────────────────────
# TRIVY (SECURITY GATE)
# ─────────────────────────────────────────
  trivy:
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - run: docker load -i image.tar

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}'
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

# ─────────────────────────────────────────
# PUSH
# ─────────────────────────────────────────
  push:
    runs-on: ubuntu-latest
    needs: [prepare, trivy]
    if: needs.prepare.outputs.push == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - run: docker load -i image.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker tag \
              ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:latest

            docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:latest
          fi

# ─────────────────────────────────────────
# RELEASE (MAIN ONLY)
# ─────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ needs.prepare.outputs.tag }}
          tag_prefix: ''

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true

# ─────────────────────────────────────────
# NOTIFY
# ─────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk, build, trivy, push, release]
    if: always()

    steps:
      - name: Send Email (Success)
        if: |
          github.ref == 'refs/heads/main' &&
          !contains(needs.*.result, 'failure')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ CI Success - ${{ inputs.service-name }} ${{ needs.prepare.outputs.tag }}"
          body: |
            Service: ${{ inputs.service-name }}
            Tag: ${{ needs.prepare.outputs.tag }}
            Image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}

          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Email (Failure)
        if: contains(needs.*.result, 'failure')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ CI Failed - ${{ inputs.service-name }}"
          body: |
            Pipeline failed

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
