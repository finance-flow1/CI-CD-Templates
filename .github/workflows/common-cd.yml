name: Common_CD

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      ci-workflow-name:
        required: true
        type: string
        description: "Must match the 'name:' field of the triggering CI workflow"

    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true

jobs:
  update-manifest:
    name: "CD – Update Helm image tag"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout application repo (for git tag)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Determine target environment based on branch ─────────────────────
      - name: Resolve environment target
        id: resolve
        run: |
          if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            # Prod: fetch the semver tag that was just created by CI
            git fetch --tags
            TAG=$(git describe --tags --abbrev=0)
            ENV="prod"
          else
            # Dev: build the same dev tag string CI would have computed
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="dev-${BRANCH}-${SHA:0:7}"
            ENV="dev"
          fi
          echo "tag=${TAG}"   >> $GITHUB_OUTPUT
          echo "env=${ENV}"   >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG}, environment: ${ENV}"

      # ── Generate GitHub App Token ────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "k8s-manifests"

      # ── Checkout the manifest/helm repository ────────────────────────────
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      # ── Install yq ───────────────────────────────────────────────────────
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # ── Patch umbrella values file with the new image tag ─────────────────
      - name: Update image tag in umbrella values
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          ENV="${{ steps.resolve.outputs.env }}"
          VALUES_FILE="manifest-repo/environments/${ENV}/values.yaml"
          SERVICE="${{ inputs.service-name }}"

          yq e ".["\"${SERVICE}\""].image.tag = \"${TAG}\"" -i "${VALUES_FILE}"

          echo "Updated ${SERVICE}.image.tag to ${TAG} in ${VALUES_FILE}"
          cat "${VALUES_FILE}"

      # ── Commit & push the tag bump ────────────────────────────────────────
      - name: Commit and push to manifest repo
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          ENV="${{ steps.resolve.outputs.env }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          cd manifest-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add environments/${ENV}/values.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(${{ inputs.service-name }}): bump image tag to ${TAG} [${BRANCH}] [skip ci]"
          git push